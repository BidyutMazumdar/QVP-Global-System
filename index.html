<!DOCTYPE html>
<html>
<head>
    <title>QVP Global Ranking</title>
</head>
<body>

<h1>QVP Global Security Ranking</h1>

<table border="1" id="rankingTable">
    <tr>
        <th>Rank</th>
        <th>Country</th>
        <th>QSSI</th>
        <th>Adjusted</th>
    </tr>
</table>

<script>
const data = [
    {Country: "USA", QSSI: 92.5, Adjusted: 87.88},
    {Country: "China", QSSI: 89.5, Adjusted: 83.24},
    {Country: "UK", QSSI: 90.0, Adjusted: 85.5},
    {Country: "Germany", QSSI: 89.5, Adjusted: 85.02},
    {Country: "France", QSSI: 88.25, Adjusted: 82.95},
    {Country: "Japan", QSSI: 90.0, Adjusted: 85.5},
    {Country: "India", QSSI: 80.25, Adjusted: 72.22},
    {Country: "Brazil", QSSI: 78.25, Adjusted: 69.64}
];

let table = document.getElementById("rankingTable");

data.forEach((c, index) => {
    let row = table.insertRow();
    row.insertCell(0).innerText = index + 1;
    row.insertCell(1).innerText = c.Country;
    row.insertCell(2).innerText = c.QSSI;
    row.insertCell(3).innerText = c.Adjusted;
});
</script>

</body>
</html>
